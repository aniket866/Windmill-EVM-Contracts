[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache = true

# Optimization settings
optimizer = true
optimizer_runs = 200

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

# Pinning compiler and EVM target improves reproducibility across local and CI runs.
solc_version = "0.8.19"
evm_version = "paris"

# Disable ffi by default for safer CI execution.
ffi = false

[fuzz]
runs = 512
max_test_rejects = 65536

[invariant]
runs = 256
depth = 32
fail_on_revert = true

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

# Public RPC endpoints for common networks.
# For production or heavy usage, replace these with your own provider URLs.
[rpc_endpoints]
ethereum = "https://rpc.ankr.com/eth"
ethereum_classic = "https://etc.rivet.link"
bsc = "https://bsc-dataseed.bnbchain.org"
base = "https://mainnet.base.org"
polygon = "https://rpc.ankr.com/polygon"
avalanche = "https://api.avax.network/ext/bc/C/rpc"
sepolia = "https://rpc.sepolia.org"
mordor = "https://rpc.mordor.etccooperative.org"

# Explorer API keys are only needed for contract verification commands.
[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
