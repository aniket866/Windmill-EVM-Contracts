[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache = true

# Optimization settings
optimizer = true
optimizer_runs = 200

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

# Pinning compiler and EVM target improves reproducibility across local and CI runs.
solc_version = "0.8.19"
evm_version = "paris"

# Disable ffi by default for safer CI execution.
ffi = false

[fuzz]
runs = 512
max_test_rejects = 65536

[invariant]
runs = 256
depth = 32
fail_on_revert = true

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

# These are placeholders for template consumers.
[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"

# Explorer API keys are only needed for contract verification commands.
[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
